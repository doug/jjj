site_name: jjj - Jujutsu Project Manager
site_description: Distributed project management and code review for Jujutsu
site_author: jjj Contributors
site_url: https://jjj.dev

repo_name: jjj
repo_url: https://github.com/yourusername/jjj
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/jjj
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Your First Project: getting-started/first-project.md
  - User Guides:
      - Work Hierarchy: guides/work-hierarchy.md
      - Code Review Workflow: guides/code-review.md
      - Task Management: guides/task-management.md
      - Board & Dashboard: guides/board-dashboard.md
      - Integration with Jujutsu: guides/jujutsu-integration.md
  - CLI Reference:
      - Commands Overview: reference/cli.md
      - Task Commands: reference/cli-task.md
      - Feature Commands: reference/cli-feature.md
      - Milestone Commands: reference/cli-milestone.md
      - Bug Commands: reference/cli-bug.md
      - Review Commands: reference/cli-review.md
      - Configuration: reference/configuration.md
  - Examples:
      - Feature Development Workflow: examples/feature-workflow.md
      - Bug Triage & Fixing: examples/bug-triage.md
      - Release Planning: examples/release-planning.md
      - Code Review Process: examples/code-review-process.md
  - Architecture:
      - Design Philosophy: architecture/design-philosophy.md
      - Storage & Metadata: architecture/storage.md
      - Change ID Tracking: architecture/change-tracking.md
      - Comment Relocation: architecture/comment-relocation.md
